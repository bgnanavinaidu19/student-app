<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Performance System</h1>
        <p class="subtext">Enter student details and marks to calculate grades, CGPA & rankings</p>
        
        <div class="card">
            <div class="input-group">
                <span class="input-label">How many students do you want to add?</span>
                <input type="number" id="count" placeholder="e.g. 3" min="1">
                <button onclick="startEntry()">Get Started</button>
            </div>
            <div id="statusMessage"></div>
        </div>

        <div id="formArea"></div>

        <div style="margin-top: 30px;">
            <button class="btn-secondary" onclick="window.location.href='result.html'">View Results & Rankings</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
