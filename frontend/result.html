<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Results</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Results</h1>
        <p class="subtext">Search by roll number to view grades, CGPA and class rank</p>

        <div class="card">
            <div class="input-group">
                <span class="input-label">Roll Number</span>
                <input type="text" id="roll" placeholder="e.g. 11" />
                <button onclick="searchResult()">Search</button>
            </div>
            <div id="message" style="margin-top: 15px; font-weight: 500;"></div>
        </div>

        <div id="resultBox" class="card" style="display: none; text-align: left;">
            <h2 id="name" style="color: #2563eb; margin-bottom: 5px;"></h2>
            <p id="subHeader" style="color: #64748b; font-size: 0.9rem; margin-bottom: 20px;"></p>
            
            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Marks</th>
                        <th>Grade</th>
                    </tr>
                </thead>
                <tbody id="resultTableBody">
                    <!-- Rows will be added here -->
                </tbody>
            </table>

            <div class="summary-container">
                <div class="summary-box">
                    <div class="summary-label">CGPA</div>
                    <div class="summary-value" id="cgpaVal">0.00</div>
                </div>
                <div class="summary-box" id="statusBox">
                    <div class="summary-label">Status</div>
                    <div class="summary-value" id="statusVal">PASS</div>
                </div>
                <div class="summary-box">
                    <div class="summary-label">Class Rank</div>
                    <div class="summary-value" id="rankVal">#0</div>
                </div>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <button class="btn-secondary" onclick="window.location.href='index.html'">Back to Home</button>
        </div>
    </div>

    <script>
        async function searchResult() {
            const roll = document.getElementById("roll").value.trim();
            const message = document.getElementById("message");
            const resultBox = document.getElementById("resultBox");

            message.innerText = "";
            resultBox.style.display = "none";

            if (roll === "") {
                message.innerText = "Please enter roll number";
                message.style.color = "#dc2626";
                return;
            }

            try {
                // 1. Fetch all students to calculate rank
                const allRes = await fetch("/students");
                const allStudents = await allRes.json();
                
                // 2. Find specific student
                const student = allStudents.find(s => s.roll === roll);

                if (!student) {
                    message.innerText = "Student not found";
                    message.style.color = "#dc2626";
                    return;
                }

                // 3. Calculate Rank
                allStudents.sort((a, b) => parseFloat(b.cgpa) - parseFloat(a.cgpa));
                const rank = allStudents.findIndex(s => s.roll === roll) + 1;

                // 4. Update UI
                document.getElementById("name").innerText = student.name.toLowerCase();
                document.getElementById("subHeader").innerText = `Roll No: ${student.roll}  |  Total: ${student.marks.reduce((a,b)=>a+b, 0)} / 500`;
                
                const tableBody = document.getElementById("resultTableBody");
                tableBody.innerHTML = "";
                const subjects = ["Web Technology", "Internet Prog.", "Unix", "Robotics", "Software Engg."];
                
                student.marks.forEach((mark, i) => {
                    const grade = student.subjectGrades[i];
                    tableBody.innerHTML += `
                        <tr>
                            <td>${subjects[i]}</td>
                            <td>${mark}</td>
                            <td class="grade-${grade}">${grade}</td>
                        </tr>
                    `;
                });

                document.getElementById("cgpaVal").innerText = student.cgpa;
                
                const statusBox = document.getElementById("statusBox");
                const statusVal = document.getElementById("statusVal");
                if (student.fail) {
                    statusVal.innerText = "FAIL";
                    statusBox.className = "summary-box status-fail";
                } else {
                    statusVal.innerText = "PASS";
                    statusBox.className = "summary-box status-pass";
                }

                document.getElementById("rankVal").innerText = `#${rank}`;

                resultBox.style.display = "block";
            } catch (error) {
                console.log(error);
                message.innerText = "Cannot connect to server";
                message.style.color = "#dc2626";
            }
        }
    </script>
</body>
</html>
