<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>🔍 Search Student Result</h2>

<input id="searchRoll" placeholder="Enter Roll Number">
<button onclick="search()">Search</button>

<div id="output"></div>

</div>

<script>
async function search() {

    const roll = document.getElementById("searchRoll").value.trim();
    const output = document.getElementById("output");

    if (!roll) {
        output.innerHTML = "Enter roll number";
        return;
    }

    try {
        // get all students (needed for ranking)
        const res = await fetch("http://localhost:5051/students");
        const data = await res.json();

        const student = data.find(s => s.roll == roll);

        if (!student) {
            output.innerHTML = "Student not found";
            return;
        }

        // SUBJECT LIST
        const subjects = ["Web Tech", "IP", "Unix", "Robotics", "SE"];

        // CALCULATE TOTAL FOR RANK
        data.forEach(s => {
            s.total = s.marks.reduce((a,b)=>a+b,0);
        });

        // sort for ranking
        data.sort((a,b)=>b.total - a.total);

        let rank = 1;
        data.forEach(s => {
            if (s.fail) {
                s.rank = "F";
            } else {
                s.rank = rank++;
            }
        });

        // find updated student with rank
        const finalStudent = data.find(s => s.roll == roll);

        // TABLE
        let rows = "";

        subjects.forEach((sub, i) => {
            rows += `
            <tr>
                <td>${sub}</td>
                <td>${finalStudent.marks[i]}</td>
                <td>${finalStudent.subjectGrades[i]}</td>
            </tr>
            `;
        });

        output.innerHTML = `
        <div class="student">
            <h3>${finalStudent.name}</h3>

            <b>Roll:</b> ${finalStudent.roll}<br><br>

            <table border="1" width="100%" style="border-collapse: collapse;">
                <tr>
                    <th>Subject</th>
                    <th>Marks</th>
                    <th>Grade</th>
                </tr>
                ${rows}
            </table>

            <br>
            <b>CGPA:</b> ${finalStudent.cgpa}<br>
            <b>Status:</b> ${finalStudent.fail ? "FAIL" : "PASS"}<br>
            <b>Rank:</b> ${finalStudent.fail ? "-" : finalStudent.rank}
        </div>
        `;

    } catch (err) {
        output.innerHTML = "Server error";
    }
}
</script>

</body>
</html>
