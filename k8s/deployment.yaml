apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-app
  template:
    metadata:
      labels:
        app: student-app
    spec:
      containers:
        - name: student-app
          image: student-app-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5050
          env:
            - name: MONGO_URL
              value: mongodb://mongo:27017/studentdb